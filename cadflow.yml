  - key: statement
    layout: prose
    title: Professional Summary
    show: true
    entries:
      - |
          Senior Machine Learning Engineer specializing in geometric deep learning and 3D geometry processing for custom manufacturing, delivering production ML systems end-to-end from data pipelines and model development through real-time, edge-deployed inference on safety-constrained hardware.
          Deep expertise in 3D image and geometry processing (meshes, point clouds, CAD/STEP/STL), learned models for material behavior and process dynamics, and full-stack delivery: PyTorch, CI/CD on AWS/Azure, and 3D web tooling (Three.js/Threlte, SvelteKit, Tauri).

