  - key: experience
    layout: timeline
    primary-element: ["institution"]
    secondary-element: ["title"]
    tertiary-element: ["description"]
    title: Professional Experience
    show: true
    entries:
      - institution: Machina Labs
        title: Senior Machine Learning Engineer
        start-date: 06/2022
        end-date: Present
        description: |
          - Own end-to-end ML delivery for industrial robotic forming (DSIF): dataset curation, experiment design, model development and evaluation, and real-time deployment in Rust on physical robotic cells.
          - Deployed a real-time TCN force-forecasting model in Rust on edge hardware — context-conditioned on toolpath geometry and material — for in-process anomaly detection, triggering safety stops when forming behavior deviates from nominal.
          - Developed a GNN springback compensation model trained on historical scan-to-CAD error maps from iterative forming campaigns, predicting per-vertex geometry offsets to reduce the iterations needed to converge formed parts to target shape.
          - Built a learned 3D inspection pipeline: PointNet-based scan cleaning (inlier/outlier classification trained on synthetically corrupted data) feeding into a scan-to-CAD registration system (learned feature extraction → inlier MLP → RANSAC + ICP refinement), achieving ~0.2 mm alignment accuracy for downstream quality measurement and compensation.
          - Built two full-stack production tools: a Tauri desktop app (Svelte/TypeScript + Three.js/Threlte frontend, Rust/Tokio backend with gRPC streaming at 125 Hz and ONNX/Burn inference) for real-time robotics monitoring and safety-critical control; and a SvelteKit + Threlte web app (FastAPI + WebSocket streaming) for LLM-powered 3D CAM enhancements.
          - Own ML and data infrastructure (ETL, dataset versioning, dashboards, CI/CD on AWS/Azure); partner cross-functionally with robotics and controls to integrate models into deployed robotic cells.
      - institution: University of California, Irvine
        title: Graduate Research Assistant & Postdoctoral Researcher
        start-date: 06/2015
        end-date: 06/2022
        description: |
          - Researched deep learning and computer vision methods for particle-physics detectors, focusing on robust classification, reconstruction, and anomaly detection with careful treatment of uncertainty and systematics.
          - Developed model-intelligibility techniques that map learned decision logic back into human-readable variables, enabling validation (spurious-correlation checks) and new hypothesis generation in exotic-search settings (e.g., semi-visible jets / dark-matter–motivated signatures).
          - Built end-to-end ML pipelines for large simulated and experimental datasets, covering data generation, preprocessing, feature engineering, model design, hyperparameter optimization, and uncertainty-aware evaluation.
          - Translated complex ML methods and results for both physicists and non-specialist collaborators across international experimental teams.
      - institution: University of Hawaii, Manoa
        title: Graduate Research Assistant
        start-date: 08/2011
        end-date: 05/2015
        description: |
          - Designed and implemented numerical simulations of Bose–Einstein condensates for a DoD-funded lattice-gas quantum computing experiment, bridging physics models and high-performance code.
          - Integrated analysis and trigger software with FPGA-based readout for a neutrino telescope, working across hardware, firmware, and scientific analysis teams.
      - institution: Northrop Grumman Aerospace
        title: Systems Engineer
        start-date: 09/2009
        end-date: 05/2011
        description: |
          - Designed and deployed secure precision-time (PTP) radio networks for U.S. Air Force installations, focusing on reliability, timing accuracy, and security.
          - Held a Secret security clearance.
  
