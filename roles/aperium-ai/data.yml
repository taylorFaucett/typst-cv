        location: Irvine, CA
        title: Ph.D. in Physics
        start-date: 2015
        end-date: 2021
      - institution: University of Hawaii, Manoa
        location: Honolulu, HI
        title: M.S. in Physics
        start-date: 2011
        end-date: 2015
