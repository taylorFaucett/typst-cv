  - key: statement
    layout: prose
    title: Professional Summary
    show: true
    entries:
      - |
          Senior ML Engineer and physicist delivering production prediction and anomaly-detection systems in safety-critical, regulated environments where missed events can carry outsized operational cost.
          Ph.D. work in particle-physics detector ML focused on offline detector-data integration and feature fusion, calibrated classification under strict error controls, and rare-event detection in noisy data.
          End-to-end experience from data pipelines and probabilistic modeling through calibration, deployment, and monitoring on real systems; these methods transfer well to high-assurance intelligence and risk-forecasting platforms. Previously held U.S. Secret clearance (inactive).

  - key: education
    layout: timeline
