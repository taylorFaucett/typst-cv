        title: B.S. in Physics, Minor in Mathematics and Music
        start-date: 2005
        end-date: 2009

  - key: experience
    layout: timeline
    primary-element: ["institution"]
    secondary-element: ["title"]
    tertiary-element: ["description"]
    title: Professional Experience
    show: true
    entries:
      - institution: Machina Labs
        title: Senior Machine Learning Engineer
        start-date: 06/2022
        end-date: Present
        description: |
          - Lead end-to-end ML delivery in production: dataset curation, experiment design, model development, calibrated evaluation, and deployment on physical manufacturing systems.
          - Built anomaly-detection models over streaming, multi-sensor data, with alert thresholds set to balance missed defects against false alarms based on operational impact.
          - Developed real-time multi-sensor fusion pipelines across encoder/load-cell telemetry, toolpath geometry, material metadata, and 3D scan outputs; aligned signals in time and fed them into shared prediction and monitoring workflows.
          - Created physics-informed models that combine process dynamics and telemetry into actionable risk indicators with uncertainty estimates for operators.
          - Deployed low-latency inference services (Rust/Python) on edge and cloud infrastructure, including model versioning, controlled rollouts, and rollback-safe releases.
          - Owned ML platform components including ETL, dataset/version management, experiment tracking (MLflow/W&B), monitoring, and CI/CD in partnership with software and manufacturing teams.
          - Implemented human-in-the-loop review loops and structured feedback capture to improve model behavior over time.
      - institution: University of California, Irvine
        title: Graduate Research Assistant & Postdoctoral Researcher
        start-date: 06/2015
        end-date: 06/2022
        description: |
          - Built ML workflows for particle-physics detectors using offline integration of calorimeter, tracking, and muon-detector outputs for event classification, reconstruction, and rare-event searches.
          - Designed and operated multi-tier event-selection pipelines (L1/L2/HLT) to process high-rate, heterogeneous data under strict latency and quality requirements.
          - Applied Bayesian methods, uncertainty propagation, and statistical hypothesis testing with explicit control of false discovery risk.
          - Developed model-interpretability approaches to map learned classifier behavior into human-readable physics variables and validate robustness to dataset shifts and spurious correlations.
          - Built anomaly-search pipelines for previously unseen signatures (for example, semi-visible jets), where useful signals are rare and background noise is dominant.
          - Co-authored work on parameterized neural networks that adapt across varying signal hypotheses, providing transferable experience for composing specialized models across regimes.
      - institution: University of Hawaii, Manoa
        title: Graduate Research Assistant
        start-date: 08/2011
        end-date: 05/2015
        description: |
          - Designed and implemented numerical simulations of Bose–Einstein condensates for a DoD-funded lattice-gas quantum computing experiment, bridging physics models and high-performance code.
          - Integrated analysis and trigger software with FPGA-based readout for a neutrino telescope, working across hardware, firmware, and scientific analysis teams.
      - institution: Northrop Grumman Aerospace
        title: Systems Engineer
        start-date: 09/2009
        end-date: 05/2011
        description: |
          - Designed and deployed secure precision-time (PTP) radio networks for U.S. Air Force installations, focusing on reliability, timing accuracy, and security within compliance-driven environments.
          - Held an active Secret security clearance.

