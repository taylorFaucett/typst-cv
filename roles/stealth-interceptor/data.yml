  - key: experience
    layout: timeline
    primary-element: ["institution"]
    secondary-element: ["title"]
    tertiary-element: ["description"]
    title: Professional Experience
    show: true
    entries:
      - institution: Machina Labs
        title: Senior Machine Learning Engineer
        start-date: 06/2022
        end-date: Present
        description: |
          - Built real-time anomaly-detection pipelines over streaming multi-sensor data (3D scan, force/torque, encoder telemetry), with alert thresholds tuned to balance missed defects against false alarms based on operational impact.
          - Developed multi-sensor fusion pipelines integrating 3D-scan outputs, force/torque telemetry, toolpath geometry, and material metadata; temporally aligned heterogeneous signals into shared detection and monitoring workflows.
          - Created physics-informed models combining process dynamics and sensor telemetry to predict material behavior and failure likelihood, with uncertainty-quantified outputs used for closed-loop process control.
          - Deployed low-latency inference services (Rust/Python) on edge hardware in air-gapped environments under strict latency budgets, including model versioning and rollback-safe rollouts.
          - Developed embedded-compatible inference components in Rust (`no_std`) for resource-constrained industrial deployments; validated real-time performance on industrial PCs under hard timing requirements.
          - Lead end-to-end ML delivery: dataset curation, experiment design, model development, evaluation, and deployment on physical manufacturing systems in partnership with robotics and controls teams.
      - institution: University of California, Irvine
        title: Graduate Research Assistant & Postdoctoral Researcher
        start-date: 06/2015
        end-date: 06/2022
        description: |
          - Built ML pipelines for large-scale particle-physics detector systems, fusing outputs from calorimeter, tracking, and muon-detector subsystems for event detection, reconstruction, and rare-signature searches.
          - Designed and operated tiered trigger pipelines (L1/L2/HLT) to process high-rate, heterogeneous sensor streams under strict latency and throughput requirements, maintaining low false-alarm rates across variable signal conditions.
          - Built anomaly-search pipelines for previously-unseen signatures (e.g., semi-visible jets) in high-background environments; applied physics-based priors, uncertainty propagation, and statistical hypothesis testing with explicit false-discovery control.
          - Developed model-interpretability approaches to map learned classifier behavior into human-readable physics variables and validate robustness to dataset shifts and spurious correlations.
          - Co-authored work on parameterized neural networks that generalize across varying signal hypotheses without retraining.
      - institution: University of Hawaii, Manoa
        title: Graduate Research Assistant
        start-date: 08/2011
        end-date: 05/2015
        description: |
          - Integrated real-time analysis and trigger software with FPGA-based sensor readout for a deep-water neutrino telescope, working across hardware, firmware, and scientific analysis teams.
          - Designed and implemented numerical simulations of Bose–Einstein condensates for a DoD-funded lattice-gas quantum computing experiment, bridging physics models and high-performance code.
      - institution: Northrop Grumman Aerospace
        title: Systems Engineer
        start-date: 09/2009
        end-date: 05/2011
        description: |
          - Designed and deployed secure precision-time (PTP) radio networks for U.S. Air Force installations, focusing on reliability, timing accuracy, and security in defense-critical environments.
          - Held an active Secret security clearance; gained direct experience operating within DoD system requirements and compliance frameworks.

