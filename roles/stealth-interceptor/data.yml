  - key: statement
    layout: prose
    title: Professional Summary
    show: true
    entries:
      - |
          Senior ML engineer and physicist with production experience building real-time multi-sensor fusion pipelines, 3D perception systems, and edge-deployed anomaly detection in safety-critical environments.
          Ph.D. research applied ML to large-scale particle-physics detector systems — designing multi-detector fusion pipelines and tiered trigger systems to detect and reconstruct rare events in high-throughput sensor data under strict latency and false-alarm constraints.
          End-to-end experience from sensor data ingestion and feature engineering through model training, evaluation, and real-time deployment on edge/embedded hardware; strong physics background relevant to dynamics, kinematics, and sensor modeling. Previously held U.S. Secret security clearance (inactive).

  - key: education
